<!DOCTYPE html>
<html lang="ku" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Enghub • University Portal</title>
    
    <meta name="theme-color" content="#050B14" id="theme-color-meta">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['system-ui', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'],
                        kurdish: ['system-ui', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif', 'Arial'],
                    },
                    colors: {
                        brand: {
                            50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6',
                            600: '#2563eb', 900: '#1e3a8a', 950: '#050B14'
                        }
                    }
                }
            }
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        .active-pill {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.35);
            color: white !important;
        }

        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            50% { transform: translate(25px, -40px) scale(1.08); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 12s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); }
        
        @keyframes cardPop {
            from { opacity: 0; transform: scale(0.96) translateY(12px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-card { animation: cardPop 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }

        .led-border-window { position: relative; overflow: hidden; }
        .led-border-window::before {
            content: ''; position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent 20%, #3b82f6, #8b5cf6, #ec4899, transparent 80%);
            animation: rotateLED 5s linear infinite; z-index: 0;
        }
        .led-border-inner { position: relative; z-index: 1; margin: 3px; }
        @keyframes rotateLED { 100% { transform: rotate(360deg); } }

        /* Hide edit buttons unless admin */
        .admin-edit-btn { display: none; }
        body.admin-mode .admin-edit-btn { display: flex; }
        
        /* Spinner */
        .loader {
            border: 3px solid rgba(59, 130, 246, 0.3);
            border-radius: 50%;
            border-top: 3px solid #3b82f6;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#050B14] text-slate-900 dark:text-slate-100 min-h-screen flex flex-col antialiased select-none overflow-x-hidden relative pb-10 transition-colors duration-500">

    <!-- Atmospheric Deep Glow Blobs -->
    <div class="fixed inset-0 z-[-1] overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[60%] h-[50%] rounded-full bg-blue-300/30 dark:bg-blue-600/10 blur-[100px] dark:blur-[120px] animate-blob transition-colors duration-700"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[50%] rounded-full bg-purple-300/30 dark:bg-purple-600/10 blur-[100px] dark:blur-[120px] animate-blob transition-colors duration-700" style="animation-delay: 4s;"></div>
    </div>

    <!-- Sticky Navigation Hub Header -->
    <header class="sticky top-0 z-40 bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl border-b border-slate-200 dark:border-white/5 transition-colors duration-500">
        <div class="px-4 py-3.5 flex justify-between items-center max-w-2xl mx-auto w-full">
            <button onclick="toggleLanguage()" class="px-3 py-1.5 rounded-full bg-white dark:bg-slate-800/60 border border-slate-200 dark:border-white/5 flex items-center justify-center text-xs font-bold text-brand-600 dark:text-brand-400 hover:bg-brand-50 dark:hover:bg-brand-900/30 transition-all shadow-sm">
                <i data-lucide="languages" class="w-4 h-4 mr-1.5 ltr-mr"></i>
                <span id="lang-text">EN</span>
            </button>
            <div class="text-center">
                <h1 id="app-title" class="text-sm font-black tracking-wide text-slate-900 dark:text-white uppercase font-kurdish">بەڕێوەبردنی زانکۆ</h1>
                <p id="app-subtitle" class="text-[11px] font-bold text-brand-600 dark:text-brand-400 mt-0.5 font-kurdish">خشتە و تاقیکردنەوەکان</p>
            </div>
            <button onclick="toggleTheme()" class="w-10 h-10 rounded-full bg-white dark:bg-slate-800/60 border border-slate-200 dark:border-white/5 flex items-center justify-center text-amber-500 shadow-sm hover:scale-105 active:scale-95 transition-all">
                <i id="theme-icon" data-lucide="sun" class="w-5 h-5"></i>
            </button>
        </div>
    </header>

    <!-- Main Responsive Body -->
    <main class="flex-grow w-full max-w-2xl mx-auto px-4 pt-6 flex flex-col gap-6">

        <!-- LED Hero (Latest Announcement) -->
        <section id="announcement-hero" class="w-full relative z-10 hidden">
            <div class="led-border-window rounded-[2rem] bg-white/80 dark:bg-slate-950/80 p-[3px] shadow-xl dark:shadow-[0_0_40px_rgba(59,130,246,0.15)] transition-colors duration-500">
                <div class="led-border-inner rounded-[1.85rem] bg-white/95 dark:bg-slate-900/90 backdrop-blur-3xl p-5 sm:p-6 flex flex-col gap-3 transition-colors duration-500">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-2 bg-rose-100 dark:bg-rose-500/10 border border-rose-200 dark:border-rose-500/20 px-3 py-1 rounded-full text-[11px] font-bold text-rose-600 dark:text-rose-400 font-kurdish">
                            <span class="w-2 h-2 rounded-full bg-rose-500 animate-pulse"></span>
                            <span data-i18n="latest_news">نوێترین ئاگاداری</span>
                        </div>
                        <i data-lucide="bell-ring" class="w-5 h-5 text-brand-500"></i>
                    </div>
                    <div class="mt-1">
                        <h2 id="hero-title" class="text-base sm:text-lg font-black font-kurdish text-slate-900 dark:text-white leading-snug">...</h2>
                        <p id="hero-desc" class="text-sm text-slate-600 dark:text-slate-400 mt-2 font-kurdish leading-relaxed">...</p>
                        <div class="flex items-center justify-end gap-2 mt-3 text-slate-500 dark:text-slate-500 text-xs font-bold">
                            <span id="hero-date">...</span>
                            <i data-lucide="calendar-clock" class="w-3.5 h-3.5 text-slate-400"></i>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Navigation Tabs -->
        <section class="grid grid-cols-4 p-1.5 bg-white/60 dark:bg-slate-900/60 backdrop-blur-md rounded-2xl border border-slate-200 dark:border-white/5 shadow-sm dark:shadow-none transition-colors duration-500">
            <button onclick="switchTab('Schedules')" id="tab-Schedules" class="active-pill py-2.5 text-center text-[10px] sm:text-xs font-bold font-kurdish rounded-xl transition-all duration-300">
                <i data-lucide="layout-grid" class="w-4 h-4 mx-auto mb-1"></i><span data-i18n="schedules">خشتەکان</span>
            </button>
            <button onclick="switchTab('Exams')" id="tab-Exams" class="text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 py-2.5 text-center text-[10px] sm:text-xs font-bold font-kurdish rounded-xl transition-all duration-300">
                <i data-lucide="file-edit" class="w-4 h-4 mx-auto mb-1"></i><span data-i18n="exams">تاقیکردنەوە</span>
            </button>
            <button onclick="switchTab('Calendar')" id="tab-Calendar" class="text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 py-2.5 text-center text-[10px] sm:text-xs font-bold font-kurdish rounded-xl transition-all duration-300">
                <i data-lucide="calendar" class="w-4 h-4 mx-auto mb-1"></i><span data-i18n="calendar">ڕۆژژمێر</span>
            </button>
            <button onclick="switchTab('Announcements')" id="tab-Announcements" class="text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 py-2.5 text-center text-[10px] sm:text-xs font-bold font-kurdish rounded-xl transition-all duration-300">
                <i data-lucide="megaphone" class="w-4 h-4 mx-auto mb-1"></i><span data-i18n="announcements">ئاگاداری</span>
            </button>
        </section>

        <!-- Dynamic Filters (Only show for schedules and exams) -->
        <section id="filter-section" class="flex flex-col gap-3">
            <!-- Search -->
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none rtl-icon">
                    <i data-lucide="search" class="w-5 h-5 text-slate-400 group-focus-within:text-brand-500 transition-colors"></i>
                </div>
                <input type="text" id="search-input" data-i18n-placeholder="search_placeholder" placeholder="گەڕان..." 
                    class="block w-full pr-4 pl-12 py-3 bg-white/70 dark:bg-slate-900/40 backdrop-blur-md border border-slate-200 dark:border-white/5 rounded-2xl text-sm font-bold outline-none focus:ring-2 focus:ring-brand-500/50 transition-all placeholder:text-slate-400 text-slate-900 dark:text-white font-kurdish rtl-input"
                    onkeyup="renderData()">
            </div>
            
            <!-- Dropdown Filters -->
            <div class="grid grid-cols-2 gap-3" id="dropdown-filters">
                <select id="filter-day" onchange="renderData()" class="block w-full px-3 py-2.5 bg-white/70 dark:bg-slate-900/40 backdrop-blur-md border border-slate-200 dark:border-white/5 rounded-xl text-xs font-bold outline-none text-slate-700 dark:text-slate-300 font-kurdish appearance-none">
                    <option value="" data-i18n="all_days">هەموو ڕۆژەکان</option>
                    <option value="Sunday" data-i18n="sun">یەکشەممە</option>
                    <option value="Monday" data-i18n="mon">دووشەممە</option>
                    <option value="Tuesday" data-i18n="tue">سێشەممە</option>
                    <option value="Wednesday" data-i18n="wed">چوارشەممە</option>
                    <option value="Thursday" data-i18n="thu">پێنجشەممە</option>
                </select>
                <select id="filter-stage" onchange="renderData()" class="block w-full px-3 py-2.5 bg-white/70 dark:bg-slate-900/40 backdrop-blur-md border border-slate-200 dark:border-white/5 rounded-xl text-xs font-bold outline-none text-slate-700 dark:text-slate-300 font-kurdish appearance-none">
                    <option value="" data-i18n="all_stages">هەموو قۆناغەکان</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                </select>
            </div>
        </section>

        <!-- Loading State -->
        <div id="loading-indicator" class="py-12 flex flex-col items-center justify-center">
            <div class="loader mb-4"></div>
            <p class="text-sm font-kurdish text-slate-500 dark:text-slate-400 font-bold" data-i18n="loading">چاوەڕێ بن...</p>
        </div>

        <!-- Render Target for Cards -->
        <section id="data-render-target" class="flex flex-col gap-4 hidden">
            <!-- Dynamically injected cards -->
        </section>

    </main>

    <!-- Footer reference -->
    <footer class="mt-8 mb-6 relative">
        <div class="text-center text-[10px] text-slate-400 dark:text-slate-500 font-sans font-medium">
            <span data-i18n="ref_text">Data referenced from</span> <span class="font-mono font-bold text-brand-500">Schedule 2026-2027.xlsx</span>
        </div>
        <!-- Hidden Admin Gateway -->
        <div class="absolute bottom-0 right-4 cursor-pointer opacity-30 hover:opacity-100 transition-opacity p-2" onclick="openAdminLogin()">
            <i data-lucide="lock" class="w-3.5 h-3.5 text-slate-400"></i>
        </div>
    </footer>

    <!-- Admin Login Modal -->
    <div id="admin-login-modal" class="fixed inset-0 bg-slate-900/50 dark:bg-black/60 backdrop-blur-sm z-50 hidden flex-col items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 rounded-2xl p-6 w-full max-w-xs shadow-2xl border border-slate-200 dark:border-slate-700 animate-card">
            <h3 class="font-bold text-lg mb-4 text-center text-slate-800 dark:text-white font-kurdish">چوونە ژوورەوەی بەڕێوەبەر</h3>
            <input type="password" id="admin-pass" placeholder="Password (admin123)" class="w-full bg-slate-100 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-xl px-4 py-2.5 mb-4 text-center text-black dark:text-white">
            <div class="flex gap-3">
                <button onclick="closeAdminLogin()" class="flex-1 py-2.5 rounded-xl bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 font-bold text-sm hover:opacity-90 transition-opacity font-kurdish">داخستن</button>
                <button onclick="verifyAdmin()" class="flex-1 py-2.5 rounded-xl bg-brand-600 text-white font-bold text-sm hover:opacity-90 transition-opacity font-kurdish">چوونەژوورەوە</button>
            </div>
        </div>
    </div>

    <!-- Edit Cell Modal -->
    <div id="edit-modal" class="fixed inset-0 bg-slate-900/50 dark:bg-black/60 backdrop-blur-sm z-50 hidden flex-col items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 rounded-2xl p-6 w-full max-w-sm shadow-2xl border border-slate-200 dark:border-slate-700 animate-card">
            <h3 class="font-bold text-lg mb-1 text-slate-800 dark:text-white font-kurdish" id="edit-title">دەستکاریکردن</h3>
            <p class="text-xs text-slate-500 mb-4 font-mono" id="edit-meta"></p>
            
            <textarea id="edit-input" class="w-full bg-slate-100 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-xl px-4 py-3 mb-4 text-black dark:text-white resize-none h-24 font-kurdish" dir="auto"></textarea>
            
            <label class="flex items-center gap-2 mb-5 cursor-pointer text-sm text-slate-700 dark:text-slate-300 font-kurdish">
                <input type="checkbox" id="edit-notify" class="w-4 h-4 rounded text-brand-600 focus:ring-brand-500 border-slate-300 bg-slate-100 dark:bg-slate-800">
                <span data-i18n="notify_email">ناردنی ئیمەیڵ بۆ خوێندکاران</span>
            </label>

            <div class="flex gap-3">
                <button onclick="closeEditModal()" class="flex-1 py-2.5 rounded-xl bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 font-bold text-sm hover:opacity-90 transition-opacity font-kurdish">پاشگەزبوونەوە</button>
                <button onclick="saveEdit()" id="save-btn" class="flex-1 py-2.5 rounded-xl bg-green-600 text-white font-bold text-sm hover:opacity-90 transition-opacity font-kurdish flex items-center justify-center gap-2">
                    <i data-lucide="save" class="w-4 h-4"></i> پاشەکەوت
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[60] transition-all duration-300 opacity-0 translate-y-10 pointer-events-none flex items-center gap-2 bg-slate-900 dark:bg-white text-white dark:text-slate-900 px-5 py-3 rounded-full shadow-2xl font-kurdish font-bold text-sm">
        <i data-lucide="check-circle-2" class="w-5 h-5 text-green-400 dark:text-green-600" id="toast-icon"></i>
        <span id="toast-msg">سەرکەوتوو بوو!</span>
    </div>

<script>
    // ==========================================
    // CONFIGURATION
    // ==========================================
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwRSAJexrtxR37RMNVH0TLkkS7L3iAaVS__AQYx5iFc9Uncl6FjaqtfXdIGHdGpcQHhYw/exec"; // <--- REPLACE WITH YOUR NEW WEB APP URL

    // Application State
    let state = {
        lang: 'ku',
        activeTab: 'Schedules',
        isAdmin: false,
        data: { Schedules: [], Exams: [], Calendar: [], Announcements: [] },
        editContext: null
    };

    // Dictionary
    const dict = {
        ku: {
            title: "بەڕێوەبردنی زانکۆ", subtitle: "خشتە و تاقیکردنەوەکان",
            schedules: "خشتەکان", exams: "تاقیکردنەوە", calendar: "ڕۆژژمێر", announcements: "ئاگاداری",
            search_placeholder: "گەڕان...", all_days: "هەموو ڕۆژەکان", all_stages: "هەموو قۆناغەکان",
            loading: "چاوەڕێ بن دەهێنرێت...", ref_text: "سەرچاوەی داتا:",
            sun: "یەکشەممە", mon: "دووشەممە", tue: "سێشەممە", wed: "چوارشەممە", thu: "پێنجشەممە",
            latest_news: "نوێترین ئاگاداری", notify_email: "ناردنی ئیمەیڵی ئاگادارکردنەوە",
            no_data: "هیچ زانیارییەک نەدۆزرایەوە", err_fetch: "هەڵە لە هێنانی داتا"
        },
        en: {
            title: "Uni Management", subtitle: "Schedules & Exams",
            schedules: "Schedules", exams: "Exams", calendar: "Calendar", announcements: "News",
            search_placeholder: "Search...", all_days: "All Days", all_stages: "All Stages",
            loading: "Loading data...", ref_text: "Data referenced from",
            sun: "Sunday", mon: "Monday", tue: "Tuesday", wed: "Wednesday", thu: "Thursday",
            latest_news: "Latest News", notify_email: "Send notification email",
            no_data: "No records found", err_fetch: "Failed to load data"
        }
    };

    // DOM Setup
    document.addEventListener('DOMContentLoaded', () => {
        syncTheme();
        applyLocalization();
        lucide.createIcons();
        fetchData();
    });

    // ==========================================
    // API & DATA HANDLING
    // ==========================================
    async function fetchData() {
        document.getElementById('loading-indicator').classList.remove('hidden');
        document.getElementById('data-render-target').classList.add('hidden');
        
        try {
            if(GAS_URL === "YOUR_GAS_URL_HERE") {
                showToast("Please set the GAS_URL in HTML code.", "alert-triangle", "red");
                return;
            }
            const res = await fetch(`${GAS_URL}?action=getAllData`);
            const json = await res.json();
            
            if (json.error) throw new Error(json.error);
            
            state.data = json;
            updateHeroAnnouncement();
            renderData();
            
        } catch (err) {
            console.error(err);
            showToast(dict[state.lang].err_fetch, 'x-circle', 'red');
        } finally {
            document.getElementById('loading-indicator').classList.add('hidden');
            document.getElementById('data-render-target').classList.remove('hidden');
        }
    }

    function updateHeroAnnouncement() {
        const hero = document.getElementById('announcement-hero');
        const list = state.data.Announcements || [];
        if (list.length > 0) {
            const latest = list[list.length - 1]; // Assume last is newest
            hero.classList.remove('hidden');
            document.getElementById('hero-title').innerText = latest.Title || "Announcement";
            document.getElementById('hero-desc').innerText = latest.Message || "";
            document.getElementById('hero-date').innerText = latest.Date || "";
        } else {
            hero.classList.add('hidden');
        }
    }

    function renderData() {
        const target = document.getElementById('data-render-target');
        target.innerHTML = '';
        
        const q = document.getElementById('search-input').value.toLowerCase();
        const fDay = document.getElementById('filter-day').value;
        const fStage = document.getElementById('filter-stage').value;
        
        let items = state.data[state.activeTab] || [];
        
        // Filtering logic
        items = items.filter(item => {
            let match = true;
            // Search
            if (q) {
                const textDump = Object.values(item).join(' ').toLowerCase();
                if (!textDump.includes(q)) match = false;
            }
            // Dropdowns (only apply if the data has these properties)
            if (fDay && item.Day && item.Day.toLowerCase() !== fDay.toLowerCase()) match = false;
            if (fStage && item.Stage && item.Stage.toString() !== fStage) match = false;
            return match;
        });

        if (items.length === 0) {
            target.innerHTML = `
                <div class="bg-white/60 dark:bg-slate-900/40 backdrop-blur-md rounded-2xl p-10 text-center animate-card border border-slate-200 dark:border-white/5">
                    <i data-lucide="folder-open" class="w-10 h-10 text-slate-400 mx-auto mb-3 opacity-50"></i>
                    <p class="font-kurdish font-bold text-slate-500">${dict[state.lang].no_data}</p>
                </div>`;
            lucide.createIcons();
            return;
        }

        // Render Cards based on Tab
        items.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = "bg-white/60 dark:bg-slate-900/30 backdrop-blur-xl border border-slate-200 dark:border-white/5 shadow-sm rounded-[1.5rem] p-4.5 animate-card hover:bg-white/90 dark:hover:bg-slate-800/40 transition-all duration-300 group";
            card.style.animationDelay = `${index * 0.05}s`;
            
            let contentHTML = '<div class="grid gap-2 text-sm">';
            
            // Render object keys as rows (skip _row metadata)
            let colIndex = 1; // 1-based index for Google Sheets Columns
            for (const [key, val] of Object.entries(item)) {
                if (key === '_row') continue;
                
                const displayVal = val || '-';
                // Admin Edit Button UI injection
                const editBtn = `<button onclick="openEdit('${state.activeTab}', ${item._row}, ${colIndex}, '${key}', \`${displayVal.replace(/`/g, "\\`")}\`)" class="admin-edit-btn w-6 h-6 rounded-lg bg-brand-100 dark:bg-brand-900/30 text-brand-600 dark:text-brand-400 flex items-center justify-center hover:bg-brand-200 dark:hover:bg-brand-800 transition-colors mr-2 rtl-ml absolute left-2 top-1/2 -translate-y-1/2"><i data-lucide="pencil" class="w-3.5 h-3.5"></i></button>`;

                contentHTML += `
                    <div class="flex items-start justify-between border-b border-slate-100 dark:border-white/5 pb-2 last:border-0 last:pb-0 relative">
                        <span class="text-slate-500 dark:text-slate-400 text-xs font-bold pt-1 min-w-[80px]">${key}</span>
                        <div class="font-kurdish font-medium text-slate-800 dark:text-slate-100 flex-grow text-right pr-2 rtl-pl pl-8 rtl-pr">
                            ${displayVal}
                            ${editBtn}
                        </div>
                    </div>`;
                colIndex++;
            }
            contentHTML += '</div>';
            card.innerHTML = contentHTML;
            target.appendChild(card);
        });

        lucide.createIcons();
    }

    // ==========================================
    // UI INTERACTIONS & THEME
    // ==========================================
    function switchTab(tabName) {
        state.activeTab = tabName;
        
        ['Schedules', 'Exams', 'Calendar', 'Announcements'].forEach(t => {
            const btn = document.getElementById(`tab-${t}`);
            if (t === tabName) {
                btn.classList.add('active-pill');
                btn.classList.remove('text-slate-500', 'dark:text-slate-400', 'hover:text-slate-800', 'dark:hover:text-slate-200');
            } else {
                btn.classList.remove('active-pill');
                btn.classList.add('text-slate-500', 'dark:text-slate-400', 'hover:text-slate-800', 'dark:hover:text-slate-200');
            }
        });

        // Hide filters if on announcements/calendar
        const filterSec = document.getElementById('filter-section');
        if (tabName === 'Schedules' || tabName === 'Exams') filterSec.classList.remove('hidden');
        else filterSec.classList.add('hidden');

        renderData();
    }

    function toggleTheme() {
        const isDark = document.documentElement.classList.contains('dark');
        const icon = document.getElementById('theme-icon');
        
        if (isDark) {
            document.documentElement.classList.remove('dark');
            document.getElementById('theme-color-meta').setAttribute('content', '#f8fafc');
            icon.setAttribute('data-lucide', 'moon');
        } else {
            document.documentElement.classList.add('dark');
            document.getElementById('theme-color-meta').setAttribute('content', '#050B14');
            icon.setAttribute('data-lucide', 'sun');
        }
        lucide.createIcons();
    }

    function toggleLanguage() {
        state.lang = state.lang === 'ku' ? 'en' : 'ku';
        applyLocalization();
    }

    function applyLocalization() {
        const t = dict[state.lang];
        
        // HTML Direction
        document.documentElement.dir = state.lang === 'ku' ? 'rtl' : 'ltr';
        document.documentElement.lang = state.lang;
        document.getElementById('lang-text').innerText = state.lang === 'ku' ? 'EN' : 'KU';

        // Translate specific IDs
        document.getElementById('app-title').innerText = t.title;
        document.getElementById('app-subtitle').innerText = t.subtitle;
        
        // Data-i18n attributes
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (t[key]) el.innerText = t[key];
        });
        
        // Placeholders
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            const key = el.getAttribute('data-i18n-placeholder');
            if (t[key]) el.placeholder = t[key];
        });

        // Toggle margins for icons based on direction
        document.querySelectorAll('.ltr-mr').forEach(el => {
            if(state.lang === 'ku') { el.classList.remove('mr-1.5'); el.classList.add('ml-1.5'); }
            else { el.classList.add('mr-1.5'); el.classList.remove('ml-1.5'); }
        });
    }

    // ==========================================
    // ADMIN FUNCTIONS
    // ==========================================
    function openAdminLogin() {
        if(state.isAdmin) {
            state.isAdmin = false;
            document.body.classList.remove('admin-mode');
            showToast("Logged out of Admin", "lock", "slate");
            return;
        }
        document.getElementById('admin-login-modal').classList.remove('hidden');
        document.getElementById('admin-login-modal').classList.add('flex');
    }
    
    function closeAdminLogin() {
        document.getElementById('admin-login-modal').classList.add('hidden');
        document.getElementById('admin-login-modal').classList.remove('flex');
        document.getElementById('admin-pass').value = '';
    }

    function verifyAdmin() {
        const pass = document.getElementById('admin-pass').value;
        if (pass === 'admin123') { // Simple client side block. GAS handles actual security if implemented.
            state.isAdmin = true;
            document.body.classList.add('admin-mode');
            closeAdminLogin();
            showToast("Admin Panel Unlocked", "unlock", "green");
        } else {
            showToast("Incorrect Password", "x-circle", "red");
        }
    }

    function openEdit(sheet, row, colIndex, keyName, value) {
        state.editContext = { sheet, row, col: colIndex, key: keyName };
        document.getElementById('edit-title').innerText = `${dict[state.lang].schedules} > ${keyName}`;
        document.getElementById('edit-meta').innerText = `Row: ${row} | Col: ${colIndex}`;
        document.getElementById('edit-input').value = value === '-' ? '' : value;
        
        document.getElementById('edit-modal').classList.remove('hidden');
        document.getElementById('edit-modal').classList.add('flex');
    }

    function closeEditModal() {
        document.getElementById('edit-modal').classList.add('hidden');
        document.getElementById('edit-modal').classList.remove('flex');
        state.editContext = null;
    }

    async function saveEdit() {
        if (!state.editContext) return;
        
        const btn = document.getElementById('save-btn');
        const originalText = btn.innerHTML;
        btn.innerHTML = `<div class="loader w-4 h-4 border-[2px] mx-auto"></div>`;
        btn.disabled = true;

        const newVal = document.getElementById('edit-input').value;
        const sendEmail = document.getElementById('edit-notify').checked;

        try {
            // 1. Update Cell
            const payload = {
                action: 'updateCell',
                sheetName: state.editContext.sheet,
                row: state.editContext.row,
                col: state.editContext.col,
                value: newVal
            };

            await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });

            // 2. Send Notification if checked
            if (sendEmail) {
                await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'sendNotification',
                        subject: `Schedule Update: ${state.editContext.sheet}`,
                        message: `The ${state.editContext.key} has been updated to: ${newVal}`,
                        targetAudience: "all"
                    })
                });
            }

            // Success
            showToast("Saved Successfully", "check-circle-2", "green");
            closeEditModal();
            fetchData(); // Refresh data

        } catch (error) {
            showToast("Failed to save", "x-circle", "red");
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }

    // Helper: Toast Notifications
    function showToast(msg, icon = 'info', color = 'brand') {
        const toast = document.getElementById('toast');
        document.getElementById('toast-msg').innerText = msg;
        const iconEl = document.getElementById('toast-icon');
        iconEl.setAttribute('data-lucide', icon);
        
        // Reset colors
        iconEl.className = `w-5 h-5 text-${color}-500`;
        lucide.createIcons();

        toast.classList.remove('opacity-0', 'translate-y-10');
        setTimeout(() => toast.classList.add('opacity-0', 'translate-y-10'), 3000);
    }
</script>
